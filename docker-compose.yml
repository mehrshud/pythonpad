version: '3.8'
services:
  app:
    build: .
    environment:
      - DATABASE_URL=postgresql://user:pass@postgresql:5432/database
      - REDIS_URL=redis://redis:6379
    env_file:
      - .env
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    volumes:
      - pythonpad-app:/app

  postgresql:
    image: postgres:13
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
      - POSTGRES_DB=database
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    volumes:
      - pythonpad-postgres:/var/lib/postgresql/data

  redis:
    image: redis:6
    healthcheck:
      test: ["CMD", "redis-cli", "PING"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    volumes:
      - pythonpad-redis:/data

volumes:
  pythonpad-app:
  pythonpad-postgres:
  pythonpad-redis:
